version: "3.9"

services:
  # ── Apache Kafka ───────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: bci-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: bci-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 1        # GDPR data minimisation
      KAFKA_LOG_SEGMENT_BYTES: 10485760
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"

  # ── PostgreSQL ────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: bci-postgres
    environment:
      POSTGRES_DB: bci_platform
      POSTGRES_USER: bci_user
      POSTGRES_PASSWORD: bci_secret_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ── BCI Platform API ──────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bci-api
    depends_on:
      - kafka
      - postgres
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://bci_user:bci_secret_dev@postgres:5432/bci_platform
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - OPENBCI_SIMULATE=true
    volumes:
      - .:/app
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Plotly Dashboard ──────────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bci-dashboard
    depends_on:
      - api
    ports:
      - "8050:8050"
    environment:
      - DATABASE_URL=postgresql://bci_user:bci_secret_dev@postgres:5432/bci_platform
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    volumes:
      - .:/app
    command: python dashboard/app.py

volumes:
  postgres_data: