# ── Kafka broker configuration for BCI Platform ──────────────────────
# Place at: streaming/config/kafka-server.properties
# Start with: kafka-server-start.sh streaming/config/kafka-server.properties

broker.id=0
listeners=PLAINTEXT://localhost:9092
# For TLS (production):
# listeners=SSL://localhost:9093
# ssl.keystore.location=/path/to/kafka.keystore.jks
# ssl.keystore.password=secret
# ssl.key.password=secret
# ssl.truststore.location=/path/to/kafka.truststore.jks
# ssl.truststore.password=secret
# ssl.client.auth=required

# ── Log/storage settings ─────────────────────────────────────────────
log.dirs=/tmp/kafka-bci-logs
num.partitions=8
default.replication.factor=1
# Production: set to 2 for RTO <2s failover
# default.replication.factor=2

# ── GDPR data minimisation: purge raw EEG after 1 hour ───────────────
log.retention.hours=1
log.retention.bytes=104857600        # 100 MB per partition
log.segment.bytes=10485760           # 10 MB segments
log.cleanup.policy=delete

# ── Performance tuning for neural streaming ───────────────────────────
num.network.threads=3
num.io.threads=8
socket.send.buffer.bytes=102400
socket.receive.buffer.bytes=102400
socket.request.max.bytes=104857600

# ── ZooKeeper ────────────────────────────────────────────────────────
zookeeper.connect=localhost:2181
zookeeper.connection.timeout.ms=18000

# ── Topic auto-creation (disable in production) ───────────────────────
auto.create.topics.enable=false